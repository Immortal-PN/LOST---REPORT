{% extends 'base.html' %}

{% block content %}

<h1>Lost Items</h1>

<div class="grid">

{% for item in items %}

<div class="card">

{% if item.image %}
<img src="{{ item.image.url }}">
{% endif %}

<div class="card-body">

<div class="card-title">
{{ item.item_name }}
</div>

<div class="card-text">
{{ item.description }}
</div>

<div class="card-text">
Location: {{ item.location_lost }}
</div>

<div class="card-text">
Date: {{ item.date_lost }}
</div>

</div>

</div>

{% empty %}

<p>No lost items found.</p>

{% endfor %}

</div>

{% endblock %}
