<!DOCTYPE html>
<html>
<head>

<title>Report Found Item</title>

<style>

body{
background:#0b1a34;
font-family:Arial;
color:white;
margin:0;
}

.header{
padding:25px 40px;
font-size:28px;
font-weight:bold;
}

.container{
display:flex;
justify-content:center;
align-items:center;
height:80vh;
}

.card{

background:#243247;
padding:40px;
border-radius:12px;
width:420px;

box-shadow:0 0 20px rgba(0,0,0,0.3);

}

.card h2{
text-align:center;
margin-bottom:30px;
}

.form-group{
margin-bottom:18px;
}

label{
display:block;
margin-bottom:6px;
}

input, textarea{

width:100%;
padding:10px;
border-radius:6px;
border:none;

}

button{

width:100%;
padding:12px;
background:linear-gradient(90deg,#5b5de6,#6d7cff);
border:none;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;

}

button:hover{
opacity:0.9;
}

</style>

</head>

<body>

<div class="header">
LostLink – Report Found Item
</div>

<div class="container">

<div class="card">

<h2>Report Found Item</h2>

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

<div class="form-group">
<label>Item Name</label>
{{ form.item_name }}
</div>

<div class="form-group">
<label>Description</label>
{{ form.description }}
</div>

<div class="form-group">
<label>Location Found</label>
{{ form.location_found }}
</div>

<div class="form-group">
<label>Date Found</label>
{{ form.date_found }}
</div>

<div class="form-group">
<label>Upload Image</label>
{{ form.image }}
</div>

<button type="submit">Submit</button>

</form>

</div>

</div>

</body>
</html>
