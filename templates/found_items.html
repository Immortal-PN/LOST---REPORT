{% extends "base.html" %}

{% block content %}

<h2>Found Items</h2>

<div class="row">

{% for item in items %}

<div class="col-md-4">

<div class="card mb-3">

{% if item.image %}
<img src="{{ item.image.url }}" class="card-img-top">
{% endif %}

<div class="card-body">

<h5>{{ item.title }}</h5>

<p>{{ item.location }}</p>

</div>

</div>

</div>

{% endfor %}

</div>

{% endblock %}
