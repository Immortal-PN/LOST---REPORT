{% extends "base.html" %}

{% block content %}

<h1>Found Items</h1>

<div class="grid">

{% for item in items %}

<div class="card">

{% if item.image %}
<img src="{{ item.image.url }}">
{% endif %}

<h3>{{ item.item_name }}</h3>

<p>{{ item.description }}</p>

<p><strong>Location:</strong> {{ item.location_found }}</p>

</div>

{% empty %}

<p>No found items yet.</p>

{% endfor %}

</div>

{% endblock %}
