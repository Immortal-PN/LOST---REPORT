{% extends "base.html" %}

{% block content %}

<div class="form-page">

<div class="form-card">

<h2 class="form-title">Login</h2>

<form method="POST">

{% csrf_token %}

<div class="form-field mb-3">
<label for="{{ form.username.id_for_label }}">Username</label>
{{ form.username }}
</div>

<div class="form-field mb-3">
<label for="{{ form.password.id_for_label }}">Password</label>
{{ form.password }}
</div>

{% if form.errors %}
<div class="alert alert-danger">Please enter a valid username and password.</div>
{% endif %}

<button type="submit" class="submit-btn">Login</button>

</form>

</div>

</div>

{% endblock %}
